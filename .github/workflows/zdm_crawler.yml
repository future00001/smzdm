    - name: check push window
      id: window
      run: |
        # 取北京时间的小时（0-23）
        HOUR=$(TZ=Asia/Shanghai date +%H)
        echo "Beijing hour: $HOUR"
        # 允许推送的时段：08:00-21:59
        if [ "$HOUR" -ge 8 ] && [ "$HOUR" -le 21 ]; then
          echo "in_window=true" >> $GITHUB_OUTPUT
        else
          echo "in_window=false" >> $GITHUB_OUTPUT
        fi

    - name: main logic
      if: steps.window.outputs.in_window == 'true'
      env:
        maxPageSize: 10
        minVoted: 8
        minComments: 2
        MIN_PUSH_SIZE: 5
        emailHost: smtp.qq.com
        emailPort: 465
        emailAccount: ${{secrets.emailAccount}}
        emailPassword: ${{secrets.emailPassword}}
        spt: ${{secrets.spt}}
        detail: false
      run: java -jar zdm.jar
